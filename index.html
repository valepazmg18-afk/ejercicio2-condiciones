<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Stickers</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1 style="color: rgb(99, 31, 54);" >Stickers Hello Kitty</h1>
    <h4 style="color: rgb(236, 9, 85);">Lleva hasta 10 stickers en total</h4>
    <div>
        <img class="img" width="200px" height="200px" src="https://rukminim2.flixcart.com/image/480/480/xif0q/sticker/o/m/b/hello-kitty-stickers-small-1-na-5-1-yaduvanshi-original-imagzdm7grmpzuyz.jpeg?q=90" alt="">
        <img class="img" width="200px" height="200px" src="https://m.media-amazon.com/images/I/61btsrd-4oL._AC_UF894,1000_QL80_.jpg" alt="">
        <img class="img" width="200px" height="200px" src="https://images-cdn.ubuy.co.id/65fd32d17317ea26e17dd8e3-pack-of-4-3-inch-stickers-hello-kitty.jpg" alt="">
    </div>
    <div>
        <input type="number" id="num1">
        <input type="number" id="num2">
        <input type="number" id="num3">
    </div>
    <p id="resultado"></p>
    <button
    onclick="
    let num1 = document.querySelector('#num1').value
    let num2 = document.querySelector('#num2').value
    let num3 = document.querySelector('#num3').value
    let suma = Number(num1) + Number(num2) + Number(num3)
    let resultado = document.querySelector('#resultado')
    resultado.textContent = suma
    
    if (suma <= 10) {
        resultado.innerHTML = 'Llevas' + ' ' + suma + ' ' + 'stickers'
    } else if (suma > 10)  {
        resultado.innerHTML = 'Llevas demasiados stickers'
    }
    "
    >Verificar</button>
            
            
        

    



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
